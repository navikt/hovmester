<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hovmester — Presentasjoner</title>
  <meta name="description" content="Tekniske presentasjoner fra hovmester-prosjektet." />

  <style>
    /* =====================================================================
     * Hovmester landing — Design tokens
     *
     * Deler palett og typografi-tenkning med _template/styles.css,
     * men er en selvstendig side, ikke en deck.
     * ===================================================================== */

    :root {
      --hm-bg:            #0a0a0a;
      --hm-bg-elevated:   #111111;
      --hm-bg-surface:    #181818;
      --hm-bg-card-hover: #1e1e1e;

      --hm-text:          #e8e8e8;
      --hm-text-strong:   #ffffff;
      --hm-text-muted:    #999999;

      --hm-accent:        #00d4aa;
      --hm-accent-dim:    #009b7d;
      --hm-accent-glow:   rgba(0, 212, 170, 0.12);

      --hm-border:        #222222;
      --hm-border-subtle: #1a1a1a;

      --hm-sans:  system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --hm-mono:  "IBM Plex Mono", "SF Mono", "Cascadia Code", Consolas, monospace;

      --hm-radius-sm: 6px;
      --hm-radius-md: 12px;
      --hm-radius-lg: 16px;
    }

    /* =====================================================================
     * Reset & base
     * ===================================================================== */

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--hm-sans);
      background: var(--hm-bg);
      color: var(--hm-text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* =====================================================================
     * Focus styles — tydelig for tastaturnavigasjon
     * ===================================================================== */

    :focus-visible {
      outline: 2px solid var(--hm-accent);
      outline-offset: 3px;
      border-radius: 2px;
    }

    /* =====================================================================
     * Layout
     * ===================================================================== */

    .hm-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .hm-container {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* =====================================================================
     * Header
     * ===================================================================== */

    .hm-header {
      padding: 80px 0 48px;
      border-bottom: 1px solid var(--hm-border);
    }

    @media (max-width: 600px) {
      .hm-header {
        padding: 48px 0 32px;
      }
    }

    .hm-header__badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--hm-mono);
      font-size: 0.8125rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--hm-accent-dim);
      margin-bottom: 20px;
    }

    .hm-header__pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--hm-accent);
      box-shadow: 0 0 6px var(--hm-accent-glow), 0 0 2px var(--hm-accent);
      flex-shrink: 0;
    }

    .hm-header__title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--hm-text-strong);
      margin-bottom: 12px;
    }

    .hm-header__subtitle {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--hm-text-muted);
      line-height: 1.5;
      max-width: 600px;
    }

    /* =====================================================================
     * Main
     * ===================================================================== */

    .hm-main {
      flex: 1;
      padding: 48px 0 80px;
    }

    @media (max-width: 600px) {
      .hm-main {
        padding: 32px 0 48px;
      }
    }

    .hm-section-label {
      font-family: var(--hm-mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--hm-text-muted);
      margin-bottom: 24px;
    }

    /* =====================================================================
     * Deck-kort
     * ===================================================================== */

    .hm-deck-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hm-deck-card {
      display: block;
      background: var(--hm-bg-elevated);
      border: 1px solid var(--hm-border);
      border-radius: var(--hm-radius-lg);
      padding: 28px 32px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .hm-deck-card:hover {
      background: var(--hm-bg-card-hover);
      border-color: var(--hm-accent-dim);
      box-shadow: 0 0 0 1px var(--hm-accent-glow), 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    .hm-deck-card:active {
      transform: translateY(1px);
    }

    @media (max-width: 600px) {
      .hm-deck-card {
        padding: 20px 20px;
      }
    }

    .hm-deck-card__top {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .hm-deck-card__title {
      font-size: clamp(1.125rem, 3vw, 1.375rem);
      font-weight: 600;
      color: var(--hm-text-strong);
      line-height: 1.3;
    }

    .hm-deck-card__engine {
      font-family: var(--hm-mono);
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      background: var(--hm-bg-surface);
      color: var(--hm-accent);
      padding: 2px 10px;
      border-radius: var(--hm-radius-sm);
      border: 1px solid var(--hm-border);
      flex-shrink: 0;
    }

    .hm-deck-card__description {
      font-size: 1rem;
      color: var(--hm-text);
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .hm-deck-card__meta {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      font-family: var(--hm-mono);
      font-size: 0.8125rem;
      color: var(--hm-text-muted);
    }

    .hm-deck-card__meta-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .hm-deck-card__meta-icon {
      opacity: 0.5;
      font-size: 0.875rem;
    }

    .hm-deck-card__tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .hm-deck-card__tag {
      font-family: var(--hm-mono);
      font-size: 0.6875rem;
      letter-spacing: 0.02em;
      color: var(--hm-text-muted);
      background: var(--hm-bg-surface);
      padding: 1px 8px;
      border-radius: 4px;
      border: 1px solid var(--hm-border-subtle);
    }

    .hm-deck-card__arrow {
      font-size: 1.25rem;
      color: var(--hm-text-muted);
      margin-left: auto;
      transition: transform 0.15s ease, color 0.15s ease;
      flex-shrink: 0;
    }

    .hm-deck-card:hover .hm-deck-card__arrow {
      transform: translateX(4px);
      color: var(--hm-accent);
    }

    /* =====================================================================
     * Tom-tilstand og feil-tilstand
     * ===================================================================== */

    .hm-empty,
    .hm-error {
      text-align: center;
      padding: 64px 24px;
      color: var(--hm-text-muted);
    }

    .hm-empty__icon,
    .hm-error__icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .hm-empty__text,
    .hm-error__text {
      font-size: 1.0625rem;
      line-height: 1.55;
      max-width: 460px;
      margin: 0 auto;
    }

    .hm-error__link {
      display: inline-block;
      margin-top: 16px;
      color: var(--hm-accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .hm-error__link:hover {
      color: var(--hm-text-strong);
    }

    /* =====================================================================
     * Laster-tilstand
     * ===================================================================== */

    .hm-loading {
      text-align: center;
      padding: 64px 24px;
    }

    .hm-loading__spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--hm-border);
      border-top-color: var(--hm-accent);
      border-radius: 50%;
      animation: hm-spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes hm-spin {
      to { transform: rotate(360deg); }
    }

    .hm-loading__text {
      font-family: var(--hm-mono);
      font-size: 0.8125rem;
      color: var(--hm-text-muted);
      letter-spacing: 0.04em;
    }

    /* =====================================================================
     * Footer
     * ===================================================================== */

    .hm-footer {
      border-top: 1px solid var(--hm-border);
      padding: 24px 0;
    }

    .hm-footer__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .hm-footer__text {
      font-family: var(--hm-mono);
      font-size: 0.75rem;
      color: var(--hm-text-muted);
      letter-spacing: 0.02em;
    }

    .hm-footer__link {
      color: var(--hm-text-muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .hm-footer__link:hover {
      color: var(--hm-accent);
    }

    /* =====================================================================
     * Dekorativ grid-bakgrunn (subtil)
     * ===================================================================== */

    .hm-page::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, var(--hm-border-subtle) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      z-index: -1;
    }

    /* =====================================================================
     * Skip-lenke (tilgjengelighet)
     * ===================================================================== */

    .hm-skip-link {
      position: absolute;
      top: -100%;
      left: 16px;
      background: var(--hm-accent);
      color: var(--hm-bg);
      padding: 8px 16px;
      font-weight: 600;
      border-radius: var(--hm-radius-sm);
      z-index: 1000;
      text-decoration: none;
    }

    .hm-skip-link:focus {
      top: 16px;
    }

    /* =====================================================================
     * Prefers-reduced-motion
     * ===================================================================== */

    @media (prefers-reduced-motion: reduce) {
      .hm-deck-card {
        transition: none;
      }
      .hm-deck-card__arrow {
        transition: none;
      }
      .hm-loading__spinner {
        animation-duration: 2s;
      }
    }
  </style>
</head>
<body>
  <a class="hm-skip-link" href="#presentasjoner">Hopp til presentasjoner</a>

  <div class="hm-page">
    <!-- Header -->
    <header class="hm-header">
      <div class="hm-container">
        <div class="hm-header__badge" aria-hidden="true">
          <span class="hm-header__pip"></span>
          <span>hovmester</span>
        </div>
        <h1 class="hm-header__title">Presentasjoner</h1>
        <p class="hm-header__subtitle">
          Tekniske presentasjoner fra hovmester-prosjektet —
          agentflyt, skills og utviklerverktøy i Nav.
        </p>
      </div>
    </header>

    <!-- Hovedinnhold -->
    <main class="hm-main" id="presentasjoner">
      <div class="hm-container">
        <p class="hm-section-label" aria-hidden="true">Publiserte presentasjoner</p>

        <!-- Laster-tilstand (skjules når data er hentet) -->
        <div class="hm-loading" id="hm-loading" role="status">
          <div class="hm-loading__spinner" aria-hidden="true"></div>
          <p class="hm-loading__text">Henter presentasjoner …</p>
        </div>

        <!-- Kortliste fylles av script -->
        <ul class="hm-deck-list" id="hm-deck-list" role="list" aria-label="Presentasjoner" hidden></ul>
      </div>
    </main>

    <!-- Footer -->
    <footer class="hm-footer">
      <div class="hm-container">
        <div class="hm-footer__inner">
          <span class="hm-footer__text">
            navikt/hovmester
          </span>
          <a class="hm-footer__link hm-footer__text"
             href="https://github.com/navikt/hovmester"
             rel="noopener noreferrer">
            GitHub ↗
          </a>
        </div>
      </div>
    </footer>
  </div>

  <!-- Statisk fallback uten JavaScript -->
  <noscript>
    <div style="max-width:700px;margin:80px auto;padding:32px 24px;font-family:system-ui,sans-serif;color:#e8e8e8;background:#111;border-radius:12px;">
      <h2 style="margin-bottom:12px;">Presentasjoner</h2>
      <p style="margin-bottom:16px;color:#aaa;">
        Denne siden krever JavaScript for å vise oversikten.
        Du kan gå direkte til presentasjonen:
      </p>
      <ul style="list-style:none;padding:0;">
        <li>
          <a href="2026-04-16-fagtorsdag/html/"
             style="color:#00d4aa;text-decoration:underline;text-underline-offset:3px;">
            Hovmester — Fagtorsdag 16. april 2026
          </a>
        </li>
      </ul>
    </div>
  </noscript>

  <script>
    (function () {
      'use strict';

      var FALLBACK_PATH = '2026-04-16-fagtorsdag/html/';
      var FALLBACK_TITLE = 'Hovmester — Fagtorsdag';

      var loadingEl = document.getElementById('hm-loading');
      var listEl = document.getElementById('hm-deck-list');

      // -------------------------------------------------------------------
      // Sikkerhet: valider at path er en trygg relativ sti
      // -------------------------------------------------------------------
      function isSafePath(path) {
        if (typeof path !== 'string' || path.length === 0) return false;

        function hasEmptySegment(value) {
          var withoutTrailingSlash = value.endsWith('/') ? value.slice(0, -1) : value;
          return withoutTrailingSlash.split('/').some(function (segment) {
            return segment.length === 0;
          });
        }

        function hasUnsafePathShape(value) {
          // Blokkér absolutte URL-er, protokoller og path traversal.
          if (/^[a-z][a-z0-9+.-]*:/i.test(value)) return true;  // http:, https:, javascript:, data: etc.
          if (value.startsWith('//')) return true;               // protocol-relative
          if (value.startsWith('/')) return true;                // absolutt sti
          if (value.indexOf('\\') !== -1) return true;           // backslash (Windows/URL-smugling)
          // eslint-disable-next-line no-control-regex
          if (/[\x00-\x1f\x7f]/.test(value)) return true;      // kontrolltegn
          if (hasEmptySegment(value)) return true;               // f.eks. «foo//bar», men tillat «foo/»
          if (value.indexOf('..') !== -1) return true;           // path traversal
          // Avvis URL-enkodede varianter av dot, slash og backslash.
          return /%(?:2e|2f|5c)/i.test(value);
        }

        var current = path;
        for (var i = 0; i < 3; i += 1) {
          if (hasUnsafePathShape(current)) return false;
          try {
            var decoded = decodeURIComponent(current);
          } catch (_e) {
            return false;
          }
          if (decoded === current) return true;
          current = decoded;
        }

        return !hasUnsafePathShape(current);
      }

      // -------------------------------------------------------------------
      // DOM-hjelpere — sikker tekst og elementer uten innerHTML
      // -------------------------------------------------------------------
      function text(str) {
        return document.createTextNode(String(str));
      }

      function el(tag, attrs, children) {
        var node = document.createElement(tag);
        if (attrs) {
          for (var key in attrs) {
            if (attrs.hasOwnProperty(key)) {
              if (key === 'className') {
                node.className = attrs[key];
              } else if (key === 'hidden') {
                if (attrs[key]) node.hidden = true;
              } else {
                node.setAttribute(key, attrs[key]);
              }
            }
          }
        }
        if (children) {
          if (!Array.isArray(children)) children = [children];
          for (var i = 0; i < children.length; i++) {
            var child = children[i];
            if (child == null) continue;
            if (typeof child === 'string' || typeof child === 'number') {
              node.appendChild(text(child));
            } else {
              node.appendChild(child);
            }
          }
        }
        return node;
      }

      // -------------------------------------------------------------------
      // Formater dato til norsk lesbar form
      // -------------------------------------------------------------------
      function formatDate(dateStr) {
        var months = [
          'januar', 'februar', 'mars', 'april', 'mai', 'juni',
          'juli', 'august', 'september', 'oktober', 'november', 'desember'
        ];
        var parts = String(dateStr).split('-');
        if (parts.length !== 3) return dateStr;
        var day = parseInt(parts[2], 10);
        var monthIdx = parseInt(parts[1], 10) - 1;
        var year = parts[0];
        if (isNaN(day) || monthIdx < 0 || monthIdx > 11) return dateStr;
        return day + '. ' + months[monthIdx] + ' ' + year;
      }

      // -------------------------------------------------------------------
      // Bygg et deck-kort
      // -------------------------------------------------------------------
      function createCard(deck) {
        var path = deck.path;
        if (!isSafePath(path)) return null;

        // Metadata-rad
        var metaItems = [];

        if (deck.date) {
          metaItems.push(
            el('span', { className: 'hm-deck-card__meta-item' }, [
              el('span', { className: 'hm-deck-card__meta-icon', 'aria-hidden': 'true' }, '◷'),
              text(formatDate(deck.date))
            ])
          );
        }

        if (deck.event) {
          metaItems.push(
            el('span', { className: 'hm-deck-card__meta-item' }, [
              el('span', { className: 'hm-deck-card__meta-icon', 'aria-hidden': 'true' }, '◆'),
              text(deck.event)
            ])
          );
        }

        // Tags
        var tagEls = [];
        if (Array.isArray(deck.tags)) {
          for (var t = 0; t < deck.tags.length; t++) {
            tagEls.push(el('span', { className: 'hm-deck-card__tag' }, String(deck.tags[t])));
          }
        }

        var topRow = el('div', { className: 'hm-deck-card__top' }, [
          el('span', { className: 'hm-deck-card__title' }, String(deck.title || 'Uten tittel')),
          deck.engine
            ? el('span', { className: 'hm-deck-card__engine' }, String(deck.engine))
            : null,
          el('span', { className: 'hm-deck-card__arrow', 'aria-hidden': 'true' }, '→')
        ]);

        var cardChildren = [topRow];

        if (deck.description) {
          cardChildren.push(
            el('p', { className: 'hm-deck-card__description' }, String(deck.description))
          );
        }

        var bottomRow = el('div', { className: 'hm-deck-card__meta' });
        for (var m = 0; m < metaItems.length; m++) {
          bottomRow.appendChild(metaItems[m]);
        }
        if (tagEls.length > 0) {
          var tagsWrapper = el('span', { className: 'hm-deck-card__tags' });
          for (var g = 0; g < tagEls.length; g++) {
            tagsWrapper.appendChild(tagEls[g]);
          }
          bottomRow.appendChild(tagsWrapper);
        }
        cardChildren.push(bottomRow);

        var link = el('a', {
          className: 'hm-deck-card',
          href: path
        }, cardChildren);

        return el('li', null, [link]);
      }

      // -------------------------------------------------------------------
      // Vis feil-tilstand med fallback-lenke
      // -------------------------------------------------------------------
      function showError(message) {
        loadingEl.hidden = true;
        listEl.hidden = true;

        var container = loadingEl.parentNode;
        var errorEl = el('div', { className: 'hm-error', role: 'alert' }, [
          el('div', { className: 'hm-error__icon', 'aria-hidden': 'true' }, '⚠'),
          el('p', { className: 'hm-error__text' }, message),
          el('a', { className: 'hm-error__link', href: FALLBACK_PATH }, [
            text('Gå til ' + FALLBACK_TITLE + ' →')
          ])
        ]);
        container.appendChild(errorEl);
      }

      // -------------------------------------------------------------------
      // Vis tom-tilstand
      // -------------------------------------------------------------------
      function showEmpty() {
        loadingEl.hidden = true;
        listEl.hidden = true;

        var container = loadingEl.parentNode;
        var emptyEl = el('div', { className: 'hm-empty' }, [
          el('div', { className: 'hm-empty__icon', 'aria-hidden': 'true' }, '◇'),
          el('p', { className: 'hm-empty__text' },
            'Ingen publiserte presentasjoner ennå.'
          )
        ]);
        container.appendChild(emptyEl);
      }

      // -------------------------------------------------------------------
      // Hent og vis presentasjoner
      // -------------------------------------------------------------------
      function loadDecks() {
        fetch('decks.json')
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function (data) {
            if (!Array.isArray(data)) throw new Error('Ugyldig format');

            // Filtrer til bare publiserte
            var published = data.filter(function (d) {
              return d && d.status === 'published';
            });

            loadingEl.hidden = true;

            if (published.length === 0) {
              showEmpty();
              return;
            }

            // Sorter etter dato, nyeste først
            published.sort(function (a, b) {
              return (b.date || '').localeCompare(a.date || '');
            });

            for (var i = 0; i < published.length; i++) {
              var card = createCard(published[i]);
              if (card) listEl.appendChild(card);
            }

            listEl.hidden = false;
          })
          .catch(function () {
            showError('Kunne ikke laste presentasjonsoversikten.');
          });
      }

      loadDecks();
    })();
  </script>
</body>
</html>
