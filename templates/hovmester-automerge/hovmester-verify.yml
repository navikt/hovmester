name: Verify hovmester sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  verify-hovmester-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify file scope
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_BRANCH: "hovmester-sync"
          EXPECTED_PR_AUTHOR: "__EXPECTED_PR_AUTHOR__" # Replace with your GitHub App bot login, e.g. my-sync-app[bot]
          HEAD_BRANCH: ${{ github.head_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "merge_group" ]]; then
            echo "✅ Required check is intentionally a no-op on merge_group"
            exit 0
          fi

          if [[ "$HEAD_BRANCH" != "$EXPECTED_BRANCH" ]] || [[ "$HEAD_REPO" != "$REPO" ]]; then
            echo "Not a hovmester sync PR — skipping"
            exit 0
          fi

          if [[ -z "$EXPECTED_PR_AUTHOR" ]] || [[ "$EXPECTED_PR_AUTHOR" == "__EXPECTED_PR_AUTHOR__" ]]; then
            echo "::error::Replace __EXPECTED_PR_AUTHOR__ with your GitHub App bot login"
            exit 1
          fi

          if [[ "$PR_AUTHOR" != "$EXPECTED_PR_AUTHOR" ]]; then
            echo "::error::Unexpected PR author: $PR_AUTHOR"
            echo "Expected PR author: $EXPECTED_PR_AUTHOR"
            exit 1
          fi

          FILES=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --paginate --jq '.[] | .filename, (.previous_filename // empty)')

          if [[ -z "$FILES" ]]; then
            echo "::error::No files found from pull request files API; failing closed"
            exit 1
          fi

          echo "Changed files:"
          echo "$FILES"

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            if [[ "$file" == .github/workflows/* ]]; then
              echo "::error::Workflow changes are not allowed in hovmester sync PRs: $file"
              exit 1
            fi

            case "$file" in
              .github/agents/*|\
              .github/instructions/*|\
              .github/skills/*|\
              .github/ISSUE_TEMPLATE/*|\
              .github/PULL_REQUEST_TEMPLATE.md|\
              .github/.hovmester-manifest.json)
                ;;
              *)
                echo "::error::File outside sync scope: $file"
                echo "Only hovmester-managed paths are allowed in sync PRs"
                exit 1
                ;;
            esac
          done <<< "$FILES"

          echo "✅ All files within hovmester sync scope"
