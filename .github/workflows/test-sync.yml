name: Test Sync Script

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'dist/**'
      - '.github/skills/prototype/scripts/**'
      - 'collections.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'biome.json'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Biome dependencies
        run: pnpm install --frozen-lockfile

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Check syncable prototype scripts with Biome
        run: pnpm run biome:check-sync-content

      - name: Run tests
        working-directory: scripts
        run: python -m pytest test_sync.py test_content.py -v
