name: Hovmester Sync

# Reusable workflow that syncs copilot customization files from hovmester.
#
# Creates a PR with changed files.
#
# If pr_app_id and APP_PRIVATE_KEY are provided, the PR is created by a
# GitHub App. This is recommended when the consumer uses auto-merge or has
# required CI checks that must trigger on sync PRs.
#
# Without app credentials, the PR is created with GITHUB_TOKEN and can be
# merged manually. Auto-merge is handled by the consumer's own verify
# workflow (hovmester-verify.yml) — not by this workflow. See README.

on:
  workflow_call:
    inputs:
      collections:
        description: "Comma-separated collections, e.g. 'hovmester,backend' or 'hovmester,frontend'."
        type: string
        required: true
      exclude:
        description: "Comma-separated names to exclude, e.g. 'kafka-topic,grill-me'."
        type: string
        required: false
      github_project:
        description: "GitHub project for issue template linking (e.g. 'navikt/123'). If empty, the projects line is stripped from templates."
        type: string
        required: false
        default: ''
      team_repo:
        description: "Teamets fellesrepo for mål og tavle-guide (e.g. 'navikt/team-esyfo'). If empty, team repo references are stripped from agents/skills."
        type: string
        required: false
        default: ''
      pr_app_id:
        description: "GitHub App ID for PR creation. Recommended when using auto-merge or required CI."
        type: string
        required: false
        default: ''
    secrets:
      APP_PRIVATE_KEY:
        description: "GitHub App private key for PR creation. Required together with pr_app_id."
        required: false

concurrency:
  group: hovmester-sync
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync hovmester customizations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout target repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Shallow clone source repo
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          git clone --depth 1 "https://github.com/${OWNER}/hovmester.git" /tmp/source
          echo "SOURCE_SHA=$(git -C /tmp/source rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run sync script
        id: sync
        env:
          COLLECTIONS: ${{ inputs.collections }}
          EXCLUDE: ${{ inputs.exclude }}
          GITHUB_PROJECT: ${{ inputs.github_project }}
          TEAM_REPO: ${{ inputs.team_repo }}
        run: |
          ARGS=(--source /tmp/source --target . --output /tmp/sync-result.json --source-sha "$SOURCE_SHA")

          if [ -n "$COLLECTIONS" ]; then
            ARGS+=(--collections "$COLLECTIONS")
          fi

          if [ -n "$EXCLUDE" ]; then
            ARGS+=(--exclude "$EXCLUDE")
          fi

          if [ -n "$GITHUB_PROJECT" ]; then
            ARGS+=(--github-project "$GITHUB_PROJECT")
          fi

          if [ -n "$TEAM_REPO" ]; then
            ARGS+=(--team-repo "$TEAM_REPO")
          fi

          python3 /tmp/source/scripts/sync.py "${ARGS[@]}"

          python3 /tmp/source/scripts/summary.py /tmp/sync-result.json >> "$GITHUB_OUTPUT"

      - name: Check if App auth is configured
        if: steps.sync.outputs.has_changes == 'true'
        id: check-app-auth
        env:
          APP_ID: ${{ inputs.pr_app_id }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [ -n "$APP_ID" ] && [ -n "$APP_PRIVATE_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$APP_ID" ] && [ -z "$APP_PRIVATE_KEY" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::pr_app_id and APP_PRIVATE_KEY must be set together"
            exit 1
          fi

      - name: Generate app token
        if: steps.check-app-auth.outputs.available == 'true'
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ inputs.pr_app_id }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create pull request
        if: steps.sync.outputs.has_changes == 'true'
        id: pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          commit-message: "chore: sync hovmester customizations"
          title: "chore: sync hovmester customizations"
          body: |
            Syncs copilot customization files from [hovmester](https://github.com/${{ github.repository_owner }}/hovmester).

            **Source:** `${{ github.repository_owner }}/hovmester@${{ env.SOURCE_SHA }}`

            **Changes:**
            ```
            ${{ steps.sync.outputs.summary }}
            ```

            ---
            🤖 Created automatically by the Hovmester Sync workflow.
          branch: hovmester-sync
          delete-branch: true
          labels: dependencies
