name: Hovmester Sync

# Reusable workflow that syncs copilot customization files from hovmester.
#
# Creates a PR with changed files. If APP_PRIVATE_KEY is provided, the PR is
# auto-approved and queued for merge — same pattern as dependabot-automerge.
#
# Token roles (when APP_PRIVATE_KEY is provided):
#   App token  → creates PR (triggers build via push event)
#   GITHUB_TOKEN → approves PR (different actor than app)
#   App token  → enables auto-merge (triggers merge_group events)
#
# Without APP_PRIVATE_KEY, the PR is created with GITHUB_TOKEN and requires
# manual review. Build may not trigger automatically in this case.

on:
  workflow_call:
    inputs:
      collections:
        description: "Comma-separated collections, e.g. 'esyfo,backend' or 'backend,frontend'."
        type: string
        required: true
      exclude:
        description: "Comma-separated names to exclude, e.g. 'kafka-topic,grill-me'."
        type: string
        required: false
      github_project:
        description: "GitHub project for issue template linking (e.g. 'navikt/123'). If empty, the projects line is stripped from templates."
        type: string
        required: false
        default: ''
      automerge_app_id:
        description: "GitHub App ID for PR creation and auto-merge. Required together with APP_PRIVATE_KEY secret. Leave empty to disable auto-merge."
        type: string
        required: false
        default: ''
    secrets:
      APP_PRIVATE_KEY:
        description: "GitHub App private key for auto-approve and auto-merge."
        required: false

concurrency:
  group: hovmester-sync
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync hovmester customizations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout target repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Shallow clone source repo
        run: |
          git clone --depth 1 https://github.com/${{ github.repository_owner }}/hovmester.git /tmp/source
          echo "SOURCE_SHA=$(git -C /tmp/source rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run sync script
        id: sync
        env:
          COLLECTIONS: ${{ inputs.collections }}
          EXCLUDE: ${{ inputs.exclude }}
          GITHUB_PROJECT: ${{ inputs.github_project }}
        run: |
          ARGS=(--source /tmp/source --target . --output /tmp/sync-result.json --source-sha "$SOURCE_SHA")

          if [ -n "$COLLECTIONS" ]; then
            ARGS+=(--collections "$COLLECTIONS")
          fi

          if [ -n "$EXCLUDE" ]; then
            ARGS+=(--exclude "$EXCLUDE")
          fi

          if [ -n "$GITHUB_PROJECT" ]; then
            ARGS+=(--github-project "$GITHUB_PROJECT")
          fi

          python3 /tmp/source/scripts/sync.py "${ARGS[@]}"

          python3 /tmp/source/scripts/summary.py /tmp/sync-result.json >> "$GITHUB_OUTPUT"

      # --- Auto-merge setup (optional) ---

      - name: Check if auto-merge is configured
        if: steps.sync.outputs.has_changes == 'true'
        id: check-secret
        env:
          HAS_SECRET: ${{ secrets.APP_PRIVATE_KEY }}
          APP_ID: ${{ inputs.automerge_app_id }}
        run: |
          if [ -n "$HAS_SECRET" ] && [ -n "$APP_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check-secret.outputs.available == 'true'
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ inputs.automerge_app_id }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # --- Create PR ---

      - name: Create pull request
        if: steps.sync.outputs.has_changes == 'true'
        id: pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          commit-message: "chore: sync hovmester customizations"
          title: "chore: sync hovmester customizations"
          body: |
            Syncs copilot customization files from [hovmester](https://github.com/${{ github.repository_owner }}/hovmester).

            **Source:** `${{ github.repository_owner }}/hovmester@${{ env.SOURCE_SHA }}`

            **Changes:**
            ```
            ${{ steps.sync.outputs.summary }}
            ```

            ---
            🤖 Created automatically by the Hovmester Sync workflow.
          branch: hovmester-sync
          delete-branch: true
          labels: dependencies

      # --- Auto-approve and merge ---

      - name: Approve pull request
        if: steps.pr.outputs.pull-request-number && steps.check-secret.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pull-request-number }}
        run: gh pr review "$PR_NUMBER" --approve --body "Auto-approved hovmester sync."

      - name: Enable auto-merge
        if: steps.pr.outputs.pull-request-number && steps.check-secret.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pull-request-number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash
